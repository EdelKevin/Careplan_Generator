<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CarePlan MVP</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: sans-serif; max-width: 720px; margin: 40px auto; padding: 0 20px; }
    h1 { font-size: 1.4rem; margin-bottom: 24px; }
    label { display: block; margin-top: 12px; font-size: 0.85rem; color: #444; }
    input, textarea { width: 100%; box-sizing: border-box; padding: 6px 8px; margin-top: 4px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.95rem; }
    textarea { height: 80px; resize: vertical; }
    button { margin-top: 20px; padding: 10px 24px; background: #2563eb; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; }
    button:disabled { background: #93c5fd; cursor: not-allowed; }
    .status-badge { display: inline-block; margin-top: 16px; padding: 4px 12px; border-radius: 12px; font-size: 0.85rem; font-weight: 600; }
    .pending, .processing { background: #fef9c3; color: #854d0e; }
    .completed { background: #dcfce7; color: #166534; }
    .failed { background: #fee2e2; color: #991b1b; }
    .result-box { margin-top: 16px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px; padding: 16px; white-space: pre-wrap; font-size: 0.9rem; }
    .error-box { margin-top: 16px; background: #fee2e2; border: 1px solid #fca5a5; border-radius: 6px; padding: 12px; color: #991b1b; }
    a.download { display: inline-block; margin-top: 12px; color: #2563eb; text-decoration: none; font-size: 0.9rem; }
    a.download:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div id="root"></div>

  {% verbatim %}
  <script type="text/babel">
    const INITIAL = {
      provider_name: "", provider_npi: "",
      patient_first_name: "", patient_last_name: "", patient_mrn: "",
      dob: "", primary_diagnosis: "",
      additional_diagnoses: "",
      medication_history: "",
      medication_name: "",
      patient_records: "",
    };

    function App() {
      const [form, setForm] = React.useState(INITIAL);
      const [submitting, setSubmitting] = React.useState(false);
      const [jobId, setJobId] = React.useState(null);
      const [jobStatus, setJobStatus] = React.useState(null);
      const [carePlanText, setCarePlanText] = React.useState("");
      const [errorMsg, setErrorMsg] = React.useState("");
      const [warning, setWarning] = React.useState(null); // {message, hint}
      const timerRef = React.useRef(null);

      function handleChange(e) {
        setForm(f => ({ ...f, [e.target.name]: e.target.value }));
      }

      function stopPolling() {
        if (timerRef.current) {
          clearInterval(timerRef.current);
          timerRef.current = null;
        }
      }

      function startPolling(id) {
        timerRef.current = setInterval(async () => {
          try {
            const res = await fetch(`/api/careplans/${id}/status/`);
            const body = await res.json();

            if (!body.ok) {
              setErrorMsg(body.error?.message || "Polling error.");
              stopPolling();
              return;
            }

            setJobStatus(body.data.status);
            if (body.data.status === "completed") {
              setCarePlanText(body.data.care_plan_text);
              stopPolling();
            } else if (body.data.status === "failed") {
              setErrorMsg(body.data.error || "Job failed.");
              stopPolling();
            }
          } catch (err) {
            // network error — keep polling
          }
        }, 3000);
      }

      // Core submit logic. confirmed=true skips duplicate warnings.
      async function submitOrder(confirmed) {
        setSubmitting(true);
        setJobId(null);
        setJobStatus(null);
        setCarePlanText("");
        setErrorMsg("");
        setWarning(null);

        const payload = {
          ...form,
          confirm: confirmed,
          additional_diagnoses: form.additional_diagnoses
            ? form.additional_diagnoses.split(",").map(s => s.trim()).filter(Boolean)
            : [],
          medication_history: form.medication_history
            ? form.medication_history.split(",").map(s => s.trim()).filter(Boolean)
            : [],
        };

        try {
          const res = await fetch("/api/orders/", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          const body = await res.json();

          if (!body.ok) {
            if (body.warnings) {
              setWarning(body.warnings[0]); // {code, message, hint}
            } else {
              setErrorMsg(body.error?.message || "Submission failed.");
            }
            return;
          }

          setJobId(body.data.job_id);
          setJobStatus(body.data.status);
          startPolling(body.data.job_id);
        } catch (err) {
          setErrorMsg(err.message);
        } finally {
          setSubmitting(false);
        }
      }

      function handleSubmit(e) {
        e.preventDefault();
        submitOrder(false);
      }

      function handleConfirm() {
        submitOrder(true);
      }

      React.useEffect(() => () => stopPolling(), []);

      return (
        <div>
          <h1>CarePlan MVP</h1>
          <form onSubmit={handleSubmit}>
            <label>Provider Name
              <input name="provider_name" value={form.provider_name} onChange={handleChange} required />
            </label>
            <label>Provider NPI
              <input name="provider_npi" value={form.provider_npi} onChange={handleChange} required />
            </label>
            <label>Patient First Name
              <input name="patient_first_name" value={form.patient_first_name} onChange={handleChange} required />
            </label>
            <label>Patient Last Name
              <input name="patient_last_name" value={form.patient_last_name} onChange={handleChange} required />
            </label>
            <label>MRN
              <input name="patient_mrn" value={form.patient_mrn} onChange={handleChange} required />
            </label>
            <label>Date of Birth
              <input name="dob" type="date" value={form.dob} onChange={handleChange} />
            </label>
            <label>Primary Diagnosis (ICD-10)
              <input name="primary_diagnosis" value={form.primary_diagnosis} onChange={handleChange} required />
            </label>
            <label>Additional Diagnoses (comma-separated ICD-10)
              <input name="additional_diagnoses" value={form.additional_diagnoses} onChange={handleChange} placeholder="I10, K21.9" />
            </label>
            <label>Medication Name
              <input name="medication_name" value={form.medication_name} onChange={handleChange} required />
            </label>
            <label>Medication History (comma-separated)
              <input name="medication_history" value={form.medication_history} onChange={handleChange} placeholder="Lisinopril 10mg, Omeprazole 20mg" />
            </label>
            <label>Patient Records / Clinical Notes
              <textarea name="patient_records" value={form.patient_records} onChange={handleChange} />
            </label>
            <button type="submit" disabled={submitting}>
              {submitting ? "Submitting..." : "Generate Care Plan"}
            </button>
          </form>

          {warning && (
            <div style={{ marginTop: 16, background: "#fef9c3", border: "1px solid #fcd34d", borderRadius: 6, padding: 12 }}>
              <strong style={{ color: "#92400e" }}>Warning</strong>
              <p style={{ margin: "6px 0", color: "#78350f" }}>{warning.message}</p>
              {warning.hint && <p style={{ margin: "4px 0", fontSize: "0.85rem", color: "#92400e" }}>{warning.hint}</p>}
              <button onClick={handleConfirm} disabled={submitting}
                style={{ marginTop: 8, padding: "6px 16px", background: "#d97706", color: "#fff", border: "none", borderRadius: 4, cursor: "pointer" }}>
                {submitting ? "Submitting..." : "Confirm and Proceed"}
              </button>
            </div>
          )}

          {errorMsg && (
            <div className="error-box">{errorMsg}</div>
          )}

          {jobId && (
            <div>
              <p style={{ marginTop: 20 }}>Job ID: <strong>{jobId}</strong></p>
              <span className={`status-badge ${jobStatus}`}>{jobStatus}</span>

              {(jobStatus === "processing" || jobStatus === "pending") && (
                <p style={{ marginTop: 8, color: "#666", fontSize: "0.9rem" }}>Polling every 3s...</p>
              )}

              {jobStatus === "completed" && carePlanText && (
                <div>
                  <div className="result-box">{carePlanText}</div>
                  <a className="download" href={`/api/careplans/${jobId}/download/`}>
                    Download as .txt
                  </a>
                </div>
              )}

              {jobStatus === "failed" && errorMsg && (
                <div className="error-box">{errorMsg}</div>
              )}
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
  {% endverbatim %}
</body>
</html>
